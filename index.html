:root {
  --bg:        #0a0010;
  --crt-green: #00ff9f;
  --crt-pink:  #ff2d78;
  --crt-blue:  #00d4ff;
  --crt-yellow:#ffe600;
  --phosphor:  #00ff9f;
  --dim:       #0d3d28;
  --panel:     #0e001a;
  --border:    #1a0030;
  --scanline:  rgba(0,0,0,0.18);
  --glow: 0 0 8px var(--crt-green), 0 0 20px var(--crt-green), 0 0 40px rgba(0,255,159,0.3);
  --glow-pink: 0 0 8px var(--crt-pink), 0 0 20px var(--crt-pink);
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--crt-green);
  font-family: 'Share Tech Mono', monospace;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  cursor: default;
}

/* grid background */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(0,255,159,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,159,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* horizon glow */
body::after {
  content: '';
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 35vh;
  background: linear-gradient(to top, rgba(255,45,120,0.12), transparent);
  pointer-events: none;
  z-index: 0;
}

/* outer shell */
.shell {
  position: relative;
  z-index: 2;
  width: 660px;
  background: var(--panel);
  border: 1px solid rgba(0,255,159,0.25);
  border-radius: 6px 6px 3px 3px;
  box-shadow:
    0 0 0 1px rgba(0,255,159,0.08),
    inset 0 0 60px rgba(0,0,0,0.8),
    0 0 80px rgba(255,45,120,0.1),
    0 0 40px rgba(0,255,159,0.08);
  overflow: hidden;
}

/* top bar */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 20px;
  border-bottom: 1px solid rgba(0,255,159,0.12);
  background: rgba(0,255,159,0.03);
}
.brand {
  font-family: 'VT323', monospace;
  font-size: 26px;
  letter-spacing: 6px;
  color: var(--crt-green);
  text-shadow: var(--glow);
}
.brand span { color: var(--crt-pink); text-shadow: var(--glow-pink); }
.leds { display: flex; gap: 8px; align-items: center; }
.led {
  width: 7px; height: 7px; border-radius: 50%;
  background: #111;
  transition: background 0.2s, box-shadow 0.2s;
}
.led.g { background: var(--crt-green); box-shadow: 0 0 6px var(--crt-green), 0 0 12px var(--crt-green); }
.led.p { background: var(--crt-pink);  box-shadow: 0 0 6px var(--crt-pink); animation: ledBlink 1.2s ease-in-out infinite; }
@keyframes ledBlink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* CRT screen */
.screen-wrap {
  position: relative;
  margin: 16px 20px;
  border-radius: 4px;
  overflow: hidden;
  background: #000;
  border: 1px solid rgba(0,255,159,0.15);
  box-shadow:
    inset 0 0 40px rgba(0,0,0,0.9),
    inset 0 0 10px rgba(0,255,159,0.05),
    0 0 20px rgba(0,255,159,0.08);
}
#oscCanvas {
  display: block;
  width: 100%;
  height: 200px;
}

/* scanlines */
.scanlines {
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    var(--scanline) 0px,
    var(--scanline) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events: none;
  z-index: 3;
}
/* vignette */
.vignette {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.75) 100%);
  pointer-events: none;
  z-index: 2;
}
/* phosphor flicker */
.flicker {
  position: absolute; inset: 0;
  opacity: 0;
  background: rgba(0,255,159,0.015);
  pointer-events: none;
  z-index: 4;
  animation: flickerAnim 0.15s infinite;
}
@keyframes flickerAnim {
  0%   { opacity: 0 }
  45%  { opacity: 1 }
  55%  { opacity: 0 }
  75%  { opacity: 0.6 }
  100% { opacity: 0 }
}

/* HUD text */
.screen-hud {
  position: absolute;
  top: 8px; left: 12px;
  font-size: 11px;
  letter-spacing: 2px;
  color: rgba(0,255,159,0.5);
  z-index: 5;
  pointer-events: none;
  text-transform: uppercase;
}
.screen-hud-r {
  position: absolute;
  top: 8px; right: 12px;
  font-size: 11px;
  letter-spacing: 2px;
  color: rgba(255,45,120,0.6);
  z-index: 5;
  pointer-events: none;
}

/* track display */
.track-block {
  padding: 0 20px 4px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}
.track-name {
  font-family: 'VT323', monospace;
  font-size: 32px;
  letter-spacing: 2px;
  color: var(--crt-green);
  text-shadow: var(--glow);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 420px;
}
.track-name.idle { color: rgba(0,255,159,0.3); text-shadow: none; }
.format-tag {
  font-size: 11px;
  letter-spacing: 3px;
  padding: 3px 8px;
  border: 1px solid rgba(255,45,120,0.4);
  color: var(--crt-pink);
  border-radius: 2px;
  text-shadow: var(--glow-pink);
  margin-bottom: 6px;
}

/* progress */
.progress-wrap { padding: 0 20px 14px; }
.progress-bar {
  height: 3px;
  background: rgba(0,255,159,0.1);
  cursor: pointer;
  position: relative;
}
.progress-fill {
  height: 100%;
  width: 0%;
  background: var(--crt-green);
  box-shadow: 0 0 6px var(--crt-green);
  position: relative;
  transition: width 0.1s linear;
}
.progress-fill::after {
  content: '';
  position: absolute;
  right: -4px; top: 50%;
  transform: translateY(-50%);
  width: 8px; height: 8px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 0 8px var(--crt-green), 0 0 16px var(--crt-green);
}
.times {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  letter-spacing: 2px;
  color: rgba(0,255,159,0.45);
  margin-top: 6px;
}

/* controls */
.controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: 6px 20px 16px;
}
.btn {
  background: none;
  border: 1px solid transparent;
  cursor: pointer;
  color: rgba(0,255,159,0.45);
  font-family: 'VT323', monospace;
  font-size: 13px;
  letter-spacing: 2px;
  padding: 6px 10px;
  border-radius: 2px;
  transition: color 0.15s, border-color 0.15s, box-shadow 0.15s, text-shadow 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.btn:hover {
  color: var(--crt-green);
  border-color: rgba(0,255,159,0.3);
  text-shadow: var(--glow);
  box-shadow: 0 0 8px rgba(0,255,159,0.15);
}
.btn:active { transform: scale(0.96); }
.btn-play {
  width: 60px; height: 60px;
  border-radius: 50%;
  border: 1px solid rgba(0,255,159,0.4);
  color: var(--crt-green);
  font-size: 22px;
}
.btn-play:hover {
  border-color: var(--crt-green);
  box-shadow: var(--glow), inset 0 0 20px rgba(0,255,159,0.08);
}
body.playing .btn-play {
  border-color: var(--crt-pink);
  color: var(--crt-pink);
  box-shadow: var(--glow-pink), inset 0 0 20px rgba(255,45,120,0.08);
}

/* bottom panel */
.bottom-panel {
  display: grid;
  grid-template-columns: 1fr 1fr;
  border-top: 1px solid rgba(0,255,159,0.1);
}
.panel-cell {
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.panel-cell + .panel-cell { border-left: 1px solid rgba(0,255,159,0.1); }
.panel-label {
  font-size: 10px;
  letter-spacing: 3px;
  color: rgba(0,255,159,0.3);
  text-transform: uppercase;
  flex-shrink: 0;
}
input[type=range] {
  -webkit-appearance: none;
  flex: 1;
  height: 2px;
  background: rgba(0,255,159,0.15);
  outline: none;
  cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 10px; height: 14px;
  background: var(--crt-green);
  box-shadow: 0 0 6px var(--crt-green);
  border-radius: 0;
}
input[type=range]::-moz-range-thumb {
  width: 10px; height: 14px;
  background: var(--crt-green);
  border: none; border-radius: 0;
}
.file-btn {
  flex: 1;
  background: transparent;
  border: 1px solid rgba(0,255,159,0.2);
  border-radius: 2px;
  color: rgba(0,255,159,0.5);
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  letter-spacing: 3px;
  padding: 8px 12px;
  cursor: pointer;
  text-transform: uppercase;
  text-align: center;
  transition: all 0.2s;
}
.file-btn:hover {
  border-color: var(--crt-green);
  color: var(--crt-green);
  text-shadow: var(--glow);
  box-shadow: 0 0 10px rgba(0,255,159,0.1);
}
#fileInput { display: none; }

/* footer */
.footer {
  padding: 8px 20px;
  border-top: 1px solid rgba(0,255,159,0.08);
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  letter-spacing: 2px;
  color: rgba(0,255,159,0.2);
}

@media (max-width: 700px) {
  .shell { width: calc(100vw - 24px); }
  .track-name { font-size: 24px; max-width: 200px; }
  .bottom-panel { grid-template-columns: 1fr; }
  .panel-cell + .panel-cell { border-left: none; border-top: 1px solid rgba(0,255,159,0.1); }
}

<audio id="audio"></audio>

<script>
  const audio        = document.getElementById('audio');
  const canvas       = document.getElementById('oscCanvas');
  const ctx          = canvas.getContext('2d');
  const fileInput    = document.getElementById('fileInput');
  const btnPlay      = document.getElementById('btnPlay');
  const btnRestart   = document.getElementById('btnRestart');
  const btnSkipBack  = document.getElementById('btnSkipBack');
  const btnSkipFwd   = document.getElementById('btnSkipFwd');
  const btnMute      = document.getElementById('btnMute');
  const volSlider    = document.getElementById('volSlider');
  const progressBar  = document.getElementById('progressBar');
  const progressFill = document.getElementById('progressFill');
  const currentTimeEl= document.getElementById('currentTime');
  const totalTimeEl  = document.getElementById('totalTime');
  const trackName    = document.getElementById('trackName');
  const formatTag    = document.getElementById('formatTag');
  const iconPlay     = document.getElementById('iconPlay');
  const iconPause    = document.getElementById('iconPause');
  const iconVol      = document.getElementById('iconVol');
  const iconMute     = document.getElementById('iconMute');
  const ledSig       = document.getElementById('ledSig');
  const ledRec       = document.getElementById('ledRec');
  const hudL         = document.getElementById('hudL');
  const hudR         = document.getElementById('hudR');
  const footerStatus = document.getElementById('footerStatus');

  let audioCtx, analyser, source, timeDomain, freqData, bufferLength;
  let animId, loaded = false, muted = false;

  function resizeCanvas() {
    const dpr = devicePixelRatio || 1;
    const w = canvas.parentElement.clientWidth;
    canvas.width  = w * dpr;
    canvas.height = 200 * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  function initAudio() {
    if (audioCtx) return;
    audioCtx    = new (window.AudioContext || window.webkitAudioContext)();
    analyser    = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    bufferLength = analyser.fftSize;
    timeDomain  = new Float32Array(bufferLength);
    freqData    = new Uint8Array(analyser.frequencyBinCount);
    source      = audioCtx.createMediaElementSource(audio);
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
  }

  // ── Idle: slow ghostly sine ──
  let idleT = 0;
  function drawIdle() {
    const W = canvas.width / devicePixelRatio;
    const H = canvas.height / devicePixelRatio;
    idleT += 0.008;

    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.fillRect(0, 0, W, H);

    const cy = H / 2;
    ctx.beginPath();
    ctx.strokeStyle = 'rgba(0,255,159,0.3)';
    ctx.lineWidth = 1.2;
    ctx.shadowColor = '#00ff9f';
    ctx.shadowBlur = 6;

    for (let x = 0; x < W; x++) {
      const t = (x / W) * Math.PI * 4 + idleT;
      const y = cy + Math.sin(t) * 4 + Math.sin(t * 2.3 + 0.5) * 1.5;
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.shadowBlur = 0;
    animId = requestAnimationFrame(drawIdle);
  }

  // ── Live oscilloscope ──
  function drawOsc() {
    const W = canvas.width / devicePixelRatio;
    const H = canvas.height / devicePixelRatio;

    analyser.getFloatTimeDomainData(timeDomain);
    analyser.getByteFrequencyData(freqData);

    // RMS amplitude
    let rms = 0;
    for (let i = 0; i < bufferLength; i++) rms += timeDomain[i] ** 2;
    rms = Math.sqrt(rms / bufferLength);

    // Bass energy
    let bass = 0;
    for (let i = 0; i < 12; i++) bass += freqData[i];
    bass = bass / (12 * 255);

    // Phosphor trail
    ctx.fillStyle = `rgba(0,0,0,${0.10 + rms * 0.25})`;
    ctx.fillRect(0, 0, W, H);

    const cy = H / 2;
    const amplitude = Math.min(H * 0.45, H * 0.08 + rms * H * 3.0);

    // Zero-crossing for stable waveform
    let start = 0;
    for (let i = 1; i < bufferLength - 1; i++) {
      if (timeDomain[i - 1] < 0 && timeDomain[i] >= 0) { start = i; break; }
    }
    const slice = Math.floor(bufferLength / W);

    const isBassHit = bass > 0.42;
    const waveColor = isBassHit ? '#ff2d78' : '#00ff9f';
    const glowColor = isBassHit
      ? `rgba(255,45,120,${0.15 + bass * 0.3})`
      : `rgba(0,255,159,${0.12 + rms * 0.35})`;

    // Glow layer
    ctx.beginPath();
    ctx.lineWidth = 8;
    ctx.strokeStyle = glowColor;
    ctx.shadowColor = waveColor;
    ctx.shadowBlur  = 28;
    for (let x = 0; x < W; x++) {
      const idx = start + x * slice;
      if (idx >= bufferLength) break;
      const y = cy - timeDomain[idx] * amplitude;
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();

    // Sharp core
    ctx.beginPath();
    ctx.lineWidth = 1.8;
    ctx.strokeStyle = waveColor;
    ctx.shadowColor = waveColor;
    ctx.shadowBlur  = 10;
    for (let x = 0; x < W; x++) {
      const idx = start + x * slice;
      if (idx >= bufferLength) break;
      const y = cy - timeDomain[idx] * amplitude;
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Update LEDs + HUD
    hudR.textContent = `AMP ${(rms * 100).toFixed(1)}%`;
    hudL.textContent = isBassHit ? 'OSCILLOSCOPE · BASS HIT' : 'OSCILLOSCOPE · LIVE';
    ledSig.className = 'led g';
    ledRec.className = isBassHit ? 'led p' : 'led';
    if (!isBassHit) { ledRec.style.background = '#111'; ledRec.style.boxShadow = 'none'; }

    animId = requestAnimationFrame(drawOsc);
  }

  function startViz() { cancelAnimationFrame(animId); drawOsc(); }
  function stopViz()  { cancelAnimationFrame(animId); drawIdle(); }

  drawIdle();

  // File load
  fileInput.addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    initAudio();
    audio.src = URL.createObjectURL(file);
    audio.load();
    const name = file.name.replace(/\.[^.]+$/, '').toUpperCase();
    trackName.textContent = name.length > 26 ? name.slice(0, 26) + '…' : name;
    trackName.classList.remove('idle');
    formatTag.textContent = file.name.split('.').pop().toUpperCase();
    footerStatus.textContent = 'LOADING…';
    loaded = true;
    audio.play();
  });

  audio.addEventListener('play', () => {
    document.body.classList.add('playing');
    iconPlay.style.display  = 'none';
    iconPause.style.display = '';
    if (audioCtx?.state === 'suspended') audioCtx.resume();
    startViz();
    hudL.textContent = 'OSCILLOSCOPE · LIVE';
    footerStatus.textContent = 'PLAYING';
  });

  audio.addEventListener('pause', () => {
    document.body.classList.remove('playing');
    iconPlay.style.display  = '';
    iconPause.style.display = 'none';
    stopViz();
    hudL.textContent = 'OSCILLOSCOPE · PAUSED';
    footerStatus.textContent = 'PAUSED';
    ledSig.className = 'led';
    ledSig.style.background = '#111';
    ledSig.style.boxShadow = 'none';
  });

  audio.addEventListener('ended', () => {
    document.body.classList.remove('playing');
    iconPlay.style.display  = '';
    iconPause.style.display = 'none';
    stopViz();
    progressFill.style.width = '0%';
    hudL.textContent = 'OSCILLOSCOPE · END OF SIGNAL';
    footerStatus.textContent = 'STOPPED';
  });

  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    progressFill.style.width = (audio.currentTime / audio.duration * 100) + '%';
    currentTimeEl.textContent = fmtTime(audio.currentTime);
    hudR.textContent = fmtTime(audio.currentTime) + ' / ' + fmtTime(audio.duration);
  });

  audio.addEventListener('loadedmetadata', () => {
    totalTimeEl.textContent = fmtTime(audio.duration);
    footerStatus.textContent = 'READY';
  });

  function fmtTime(s) {
    return Math.floor(s/60) + ':' + String(Math.floor(s%60)).padStart(2,'0');
  }

  btnPlay.addEventListener('click', () => {
    if (!loaded) { fileInput.click(); return; }
    if (audioCtx?.state === 'suspended') audioCtx.resume();
    audio.paused ? audio.play() : audio.pause();
  });
  btnRestart.addEventListener('click',  () => { if (loaded) { audio.currentTime = 0; audio.play(); } });
  btnSkipBack.addEventListener('click', () => { if (loaded) audio.currentTime = Math.max(0, audio.currentTime - 10); });
  btnSkipFwd.addEventListener('click',  () => { if (loaded) audio.currentTime = Math.min(audio.duration||0, audio.currentTime+10); });

  btnMute.addEventListener('click', () => {
    muted = !muted;
    audio.muted = muted;
    iconVol.style.display  = muted ? 'none' : '';
    iconMute.style.display = muted ? '' : 'none';
  });

  volSlider.addEventListener('input', () => { audio.volume = parseFloat(volSlider.value); });
  audio.volume = parseFloat(volSlider.value);

  progressBar.addEventListener('click', e => {
    if (!audio.duration) return;
    const r = progressBar.getBoundingClientRect();
    audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
  });
</script>

</body>
</html>
