:root {
  --bg: #050508;
  --surface: #0d0d14;
  --accent: #e8ff47;
  --accent2: #ff3c6e;
  --accent3: #00eaff;
  --text: #f0f0f0;
  --muted: #555570;
  --border: #1e1e2e;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Mono', monospace;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* Ambient BG blobs */
.blob {
  position: fixed;
  border-radius: 50%;
  filter: blur(100px);
  opacity: 0;
  transition: opacity 1s ease, transform 0.5s ease;
  pointer-events: none;
  z-index: 0;
}
.blob-1 { width: 600px; height: 600px; background: var(--accent2); top: -200px; left: -200px; }
.blob-2 { width: 500px; height: 500px; background: var(--accent3); bottom: -200px; right: -150px; }
.blob-3 { width: 400px; height: 400px; background: var(--accent); top: 50%; left: 50%; transform: translate(-50%, -50%); }

body.playing .blob { opacity: 0.07; }
body.playing .blob-1 { animation: blobPulse1 3s ease-in-out infinite; }
body.playing .blob-2 { animation: blobPulse2 4s ease-in-out infinite; }
body.playing .blob-3 { animation: blobPulse3 2.5s ease-in-out infinite; }

@keyframes blobPulse1 { 0%,100%{transform:scale(1) translate(0,0);} 50%{transform:scale(1.3) translate(30px,20px);} }
@keyframes blobPulse2 { 0%,100%{transform:scale(1) translate(0,0);} 50%{transform:scale(1.2) translate(-20px,-30px);} }
@keyframes blobPulse3 { 0%,100%{transform:translate(-50%,-50%) scale(0.8);} 50%{transform:translate(-50%,-50%) scale(1.2);} }

/* Grain overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
  background-size: 200px 200px;
  opacity: 0.3;
  pointer-events: none;
  z-index: 1;
}

/* Main card */
.player {
  position: relative;
  z-index: 2;
  width: 420px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 32px;
  display: flex;
  flex-direction: column;
  gap: 28px;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 40px 80px rgba(0,0,0,0.7);
}

/* Header */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  letter-spacing: 6px;
  color: var(--accent);
}
.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--muted);
  transition: background 0.3s, box-shadow 0.3s;
}
body.playing .status-dot {
  background: var(--accent);
  box-shadow: 0 0 12px var(--accent);
  animation: dotPulse 1s ease-in-out infinite;
}
@keyframes dotPulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

/* Visualizer canvas */
.viz-wrap {
  position: relative;
  width: 100%;
  height: 100px;
  border-radius: 2px;
  overflow: hidden;
}
#vizCanvas {
  width: 100%;
  height: 100%;
  display: block;
}
.viz-label {
  position: absolute;
  bottom: 6px;
  right: 10px;
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
}

/* Track info */
.track-info {
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-height: 52px;
}
.track-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 30px;
  letter-spacing: 2px;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: color 0.3s;
}
body.playing .track-name { color: var(--accent); }
.track-sub {
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--muted);
  text-transform: uppercase;
}

/* Progress */
.progress-section { display: flex; flex-direction: column; gap: 8px; }
.times { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); letter-spacing: 1px; }
.progress-bar {
  width: 100%;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  cursor: pointer;
  position: relative;
  overflow: visible;
}
.progress-fill {
  height: 100%;
  width: 0%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.1s linear;
  position: relative;
}
.progress-fill::after {
  content: '';
  position: absolute;
  right: -4px; top: 50%;
  transform: translateY(-50%);
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
  opacity: 0;
  transition: opacity 0.2s;
}
.progress-bar:hover .progress-fill::after { opacity: 1; }

/* Controls */
.controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 24px;
}
.btn {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--muted);
  transition: color 0.2s, transform 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
}
.btn:hover { color: var(--text); transform: scale(1.1); }
.btn:active { transform: scale(0.95); }
.btn-play {
  width: 56px; height: 56px;
  border-radius: 50%;
  background: var(--accent);
  color: var(--bg);
  transition: background 0.2s, transform 0.15s, box-shadow 0.3s;
}
.btn-play:hover { background: #fff; transform: scale(1.08); }
body.playing .btn-play { box-shadow: 0 0 30px rgba(232,255,71,0.5); }

/* Volume */
.volume-row {
  display: flex;
  align-items: center;
  gap: 12px;
}
.vol-icon { color: var(--muted); flex-shrink: 0; }
input[type=range] {
  -webkit-appearance: none;
  flex: 1;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 6px var(--accent);
}
input[type=range]::-moz-range-thumb {
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--accent);
  border: none;
}

/* File picker */
.file-row {
  display: flex;
  gap: 10px;
  align-items: center;
}
.file-btn {
  flex: 1;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 2px;
  color: var(--muted);
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  padding: 10px 14px;
  cursor: pointer;
  text-transform: uppercase;
  transition: border-color 0.2s, color 0.2s, background 0.2s;
  text-align: center;
}
.file-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(232,255,71,0.04);
}
#fileInput { display: none; }

/* Equalizer bars (idle decoration) */
.eq-bars {
  display: flex;
  align-items: flex-end;
  gap: 3px;
  height: 20px;
}
.eq-bar {
  width: 3px;
  background: var(--muted);
  border-radius: 1px;
  transition: height 0.1s ease;
}
body.playing .eq-bar { background: var(--accent); }

/* Responsive */
@media (max-width: 480px) {
  .player { width: calc(100vw - 32px); padding: 24px; }
  .track-name { font-size: 24px; }
}

  <script>
    const audio = document.getElementById('audio');
    const canvas = document.getElementById('vizCanvas');
    const ctx = canvas.getContext('2d');
    const fileInput = document.getElementById('fileInput');
    const btnPlay = document.getElementById('btnPlay');
    const btnRestart = document.getElementById('btnRestart');
    const btnSkipBack = document.getElementById('btnSkipBack');
    const btnSkipFwd = document.getElementById('btnSkipFwd');
    const btnMute = document.getElementById('btnMute');
    const volSlider = document.getElementById('volSlider');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const currentTimeEl = document.getElementById('currentTime');
    const totalTimeEl = document.getElementById('totalTime');
    const trackName = document.getElementById('trackName');
    const trackSub = document.getElementById('trackSub');
    const iconPlay = document.getElementById('iconPlay');
    const iconPause = document.getElementById('iconPause');
    const iconVol = document.getElementById('iconVol');
    const iconMute = document.getElementById('iconMute');
    const eqBars = document.querySelectorAll('.eq-bar');

    let audioCtx, analyser, source, dataArray, bufferLength;
    let animId;
    let loaded = false;

    function initAudio() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 256;
      bufferLength = analyser.frequencyBinCount;
      dataArray = new Uint8Array(bufferLength);
      source = audioCtx.createMediaElementSource(audio);
      source.connect(analyser);
      analyser.connect(audioCtx.destination);
    }

    function resizeCanvas() {
      const wrap = canvas.parentElement;
      canvas.width = wrap.clientWidth * devicePixelRatio;
      canvas.height = wrap.clientHeight * devicePixelRatio;
      ctx.scale(devicePixelRatio, devicePixelRatio);
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    const CSS = getComputedStyle(document.documentElement);
    const C_ACCENT = '#e8ff47';
    const C_ACCENT2 = '#ff3c6e';
    const C_ACCENT3 = '#00eaff';
    const C_BG = '#0d0d14';

    function drawIdle() {
      const w = canvas.width / devicePixelRatio;
      const h = canvas.height / devicePixelRatio;
      ctx.clearRect(0, 0, w, h);
      // Draw a flat waveform
      ctx.beginPath();
      ctx.moveTo(0, h / 2);
      for (let x = 0; x < w; x++) {
        ctx.lineTo(x, h / 2 + Math.sin(x * 0.04 + Date.now() * 0.001) * 3);
      }
      ctx.strokeStyle = 'rgba(85,85,112,0.5)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      animId = requestAnimationFrame(drawIdle);
    }

    function drawVisualizer() {
      const w = canvas.width / devicePixelRatio;
      const h = canvas.height / devicePixelRatio;
      analyser.getByteFrequencyData(dataArray);
      ctx.clearRect(0, 0, w, h);

      const barCount = 80;
      const barW = w / barCount;
      const gap = 2;

      let bassSum = 0;
      const bassRange = Math.floor(bufferLength * 0.1);
      for (let i = 0; i < bassRange; i++) bassSum += dataArray[i];
      const bassAvg = bassSum / bassRange / 255;

      // Pulse glow background on bass
      if (bassAvg > 0.3) {
        const grd = ctx.createRadialGradient(w/2, h, 0, w/2, h/2, w * bassAvg);
        grd.addColorStop(0, `rgba(232,255,71,${bassAvg * 0.15})`);
        grd.addColorStop(1, 'transparent');
        ctx.fillStyle = grd;
        ctx.fillRect(0, 0, w, h);
      }

      for (let i = 0; i < barCount; i++) {
        const dataIdx = Math.floor(i / barCount * bufferLength * 0.75);
        const val = dataArray[dataIdx] / 255;
        const barH = val * h * 0.9;

        const ratio = i / barCount;
        let r, g, b;
        if (ratio < 0.33) {
          r = 232; g = 255; b = 71; // accent yellow-green
        } else if (ratio < 0.66) {
          r = 0; g = 234; b = 255; // cyan
        } else {
          r = 255; g = 60; b = 110; // pink
        }

        const alpha = 0.3 + val * 0.7;
        ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
        const x = i * barW;
        const y = h - barH;
        ctx.fillRect(x + gap/2, y, barW - gap, barH);

        // Reflection
        ctx.fillStyle = `rgba(${r},${g},${b},${alpha * 0.2})`;
        ctx.fillRect(x + gap/2, h, barW - gap, barH * 0.3);
      }

      // Animate eq bars
      const avgFreqs = [0, 5, 15, 30, 60];
      eqBars.forEach((bar, i) => {
        const v = dataArray[avgFreqs[i]] / 255;
        bar.style.height = (4 + v * 16) + 'px';
      });

      animId = requestAnimationFrame(drawVisualizer);
    }

    function startViz() {
      cancelAnimationFrame(animId);
      drawVisualizer();
    }
    function stopViz() {
      cancelAnimationFrame(animId);
      drawIdle();
    }

    // Init idle animation
    drawIdle();

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      initAudio();
      const url = URL.createObjectURL(file);
      audio.src = url;
      audio.load();
      const name = file.name.replace(/\.[^.]+$/, '').toUpperCase();
      trackName.textContent = name.length > 22 ? name.slice(0, 22) + '…' : name;
      const ext = file.name.split('.').pop().toUpperCase();
      trackSub.textContent = formatSize(file.size) + ' · ' + ext;
      loaded = true;
      audio.play();
    });

    function formatSize(bytes) {
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(0) + ' KB';
      return (bytes / 1024 / 1024).toFixed(1) + ' MB';
    }

    audio.addEventListener('play', () => {
      document.body.classList.add('playing');
      iconPlay.style.display = 'none';
      iconPause.style.display = '';
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
      startViz();
    });

    audio.addEventListener('pause', () => {
      document.body.classList.remove('playing');
      iconPlay.style.display = '';
      iconPause.style.display = 'none';
      stopViz();
    });

    audio.addEventListener('ended', () => {
      document.body.classList.remove('playing');
      iconPlay.style.display = '';
      iconPause.style.display = 'none';
      stopViz();
      progressFill.style.width = '0%';
    });

    audio.addEventListener('timeupdate', () => {
      if (!audio.duration) return;
      const pct = (audio.currentTime / audio.duration) * 100;
      progressFill.style.width = pct + '%';
      currentTimeEl.textContent = fmtTime(audio.currentTime);
    });

    audio.addEventListener('loadedmetadata', () => {
      totalTimeEl.textContent = fmtTime(audio.duration);
    });

    function fmtTime(s) {
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return m + ':' + String(sec).padStart(2, '0');
    }

    btnPlay.addEventListener('click', () => {
      if (!loaded) { fileInput.click(); return; }
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
      audio.paused ? audio.play() : audio.pause();
    });

    btnRestart.addEventListener('click', () => {
      if (!loaded) return;
      audio.currentTime = 0;
      audio.play();
    });

    btnSkipBack.addEventListener('click', () => {
      if (!loaded) return;
      audio.currentTime = Math.max(0, audio.currentTime - 10);
    });

    btnSkipFwd.addEventListener('click', () => {
      if (!loaded) return;
      audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 10);
    });

    let muted = false;
    btnMute.addEventListener('click', () => {
      muted = !muted;
      audio.muted = muted;
      iconVol.style.display = muted ? 'none' : '';
      iconMute.style.display = muted ? '' : 'none';
    });

    volSlider.addEventListener('input', () => {
      audio.volume = parseFloat(volSlider.value);
    });

    progressBar.addEventListener('click', (e) => {
      if (!audio.duration) return;
      const rect = progressBar.getBoundingClientRect();
      const pct = (e.clientX - rect.left) / rect.width;
      audio.currentTime = pct * audio.duration;
    });

    audio.volume = parseFloat(volSlider.value);
  </script>
